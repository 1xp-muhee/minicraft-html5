<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OfficeCraft: Employee Mayhem</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#cdd7e1; font-family:system-ui,sans-serif; touch-action:none; }
    #ui{position:fixed;left:10px;top:10px;z-index:10;color:#fff;background:rgba(0,0,0,.45);padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.45;max-width:75vw}
    #cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;color:#fff;font-size:22px;text-shadow:0 0 6px #000;pointer-events:none}
    #start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.55)}
    #start button{font-size:18px;padding:14px 22px;border:none;border-radius:10px;cursor:pointer}
    .danger{color:#ff8080;font-weight:700}

    #mobileHud{position:fixed;inset:0;z-index:15;pointer-events:none;display:none}
    #stickBase{position:absolute;left:20px;bottom:20px;width:120px;height:120px;border-radius:999px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);pointer-events:auto}
    #stickKnob{position:absolute;left:40px;top:40px;width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.75)}
    .mbtn{position:absolute;right:20px;width:74px;height:74px;border:none;border-radius:999px;color:#fff;font-weight:700;font-size:14px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.35);pointer-events:auto}
    #hitBtn{bottom:22px}
    #jumpBtn{bottom:108px}
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>OfficeCraft: Employee Mayhem</strong></div>
    <div id="controlsText">WASD 이동 / Space 점프 / Shift 달리기</div>
    <div id="lookText">마우스 시점 / 좌클릭 <span class="danger">직원 때리기</span></div>
    <div>점수: <span id="score">0</span> | 직원 수: <span id="alive">0</span></div>
  </div>
  <div id="cross">+</div>
  <div id="start"><button id="startBtn">클릭해서 시작</button></div>

  <div id="mobileHud">
    <div id="stickBase"><div id="stickKnob"></div></div>
    <button class="mbtn" id="jumpBtn">점프</button>
    <button class="mbtn" id="hitBtn">공격</button>
  </div>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';

    const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcdd7e1);
    scene.fog = new THREE.Fog(0xcdd7e1, 20, 120);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 250);
    const player = new THREE.Object3D();
    player.position.set(0, 1.6, 8);
    camera.position.set(0,0,0);
    player.add(camera);
    scene.add(player);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8ea0b2, 0.75));
    const d = new THREE.DirectionalLight(0xffffff, 0.9);
    d.position.set(20,40,10); d.castShadow = true; d.shadow.mapSize.set(2048,2048); scene.add(d);

    const start = document.getElementById('start');
    const mobileHud = document.getElementById('mobileHud');

    let controlEnabled = false;
    document.getElementById('startBtn').onclick = async () => {
      controlEnabled = true;
      start.style.display = 'none';
      if (isTouch) {
        mobileHud.style.display = 'block';
      } else {
        await document.body.requestPointerLock?.();
      }
    };

    document.addEventListener('pointerlockchange', ()=>{
      if (!isTouch && document.pointerLockElement !== document.body && controlEnabled) {
        start.style.display = 'flex';
        controlEnabled = false;
      }
    });

    if (isTouch) {
      document.getElementById('controlsText').textContent = '왼쪽 조이스틱 이동 / 점프 버튼';
      document.getElementById('lookText').innerHTML = '오른쪽 화면 드래그 시점 / 공격 버튼 <span class="danger">직원 때리기</span>';
    }

    // Office floor & walls
    const floor = new THREE.Mesh(new THREE.BoxGeometry(80,1,80), new THREE.MeshStandardMaterial({color:0xbfc7d1}));
    floor.position.y = -0.5; floor.receiveShadow = true; scene.add(floor);
    function wall(x,y,z,w,h,dd,col=0xe8edf2){
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,dd), new THREE.MeshStandardMaterial({color:col}));
      m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m);
    }
    wall(0,2,-40,80,5,1); wall(0,2,40,80,5,1); wall(-40,2,0,1,5,80); wall(40,2,0,1,5,80);

    function desk(x,z){
      const top = new THREE.Mesh(new THREE.BoxGeometry(3,0.25,2), new THREE.MeshStandardMaterial({color:0x8d6e63}));
      top.position.set(x,1.2,z); top.castShadow=true; top.receiveShadow=true; scene.add(top);
      const legGeo = new THREE.BoxGeometry(0.2,1.1,0.2);
      const legMat = new THREE.MeshStandardMaterial({color:0x555});
      [[1.3,0.6,0.8],[-1.3,0.6,0.8],[1.3,0.6,-0.8],[-1.3,0.6,-0.8]].forEach(([lx,ly,lz])=>{
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x+lx,ly,z+lz); leg.castShadow=true; leg.receiveShadow=true; scene.add(leg);
      });
      const pc = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.6,0.08), new THREE.MeshStandardMaterial({color:0x202225}));
      pc.position.set(x,1.65,z-0.45); scene.add(pc);
    }
    for(let gx=-24; gx<=24; gx+=8){
      for(let gz=-24; gz<=24; gz+=8){ if(Math.random()>0.18) desk(gx,gz); }
    }

    // NPC
    const npcs = [];
    const npcGroup = new THREE.Group(); scene.add(npcGroup);
    const raycaster = new THREE.Raycaster();

    function makeNPC(x,z){
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.1,0.45), new THREE.MeshStandardMaterial({color:0x4f79d8})); body.position.y = 0.95;
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.55), new THREE.MeshStandardMaterial({color:0xf0c7a4})); head.position.y = 1.8;
      g.add(body, head); g.position.set(x,0,z);
      g.userData = { hp:3, speed:0.9+Math.random()*0.8, dir:new THREE.Vector3(Math.random()*2-1,0,Math.random()*2-1).normalize(), turnTimer:0.8+Math.random()*2.2, dead:false };
      npcGroup.add(g); npcs.push(g);
    }

    const scoreEl = document.getElementById('score');
    const aliveEl = document.getElementById('alive');
    let score = 0;
    function updateAlive(){ aliveEl.textContent = npcs.filter(n=>!n.userData.dead).length; }
    for(let i=0;i<18;i++) makeNPC((Math.random()*60)-30,(Math.random()*60)-30);
    updateAlive();

    // Camera look
    let yaw = 0, pitch = 0;
    function applyLook(){
      player.rotation.y = yaw;
      camera.rotation.x = pitch;
    }
    document.addEventListener('mousemove', (e)=>{
      if (!controlEnabled || document.pointerLockElement !== document.body) return;
      yaw -= e.movementX * 0.0024;
      pitch -= e.movementY * 0.0024;
      pitch = Math.max(-1.3, Math.min(1.3, pitch));
      applyLook();
    });

    // Movement inputs
    const move = {f:false,b:false,l:false,r:false,run:false,jump:false};
    const vel = new THREE.Vector3();
    let canJump = false;
    const onKey=(d,e)=>{
      switch(e.code){
        case 'KeyW': move.f=d; break; case 'KeyS': move.b=d; break;
        case 'KeyA': move.l=d; break; case 'KeyD': move.r=d; break;
        case 'ShiftLeft': move.run=d; break;
        case 'Space': if(d) move.jump=true; break;
      }
    };
    addEventListener('keydown',e=>onKey(true,e));
    addEventListener('keyup',e=>onKey(false,e));

    function clampPlayer(p){ p.x = Math.max(-38, Math.min(38,p.x)); p.z = Math.max(-38, Math.min(38,p.z)); }

    function hitNPC(){
      raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
      const aliveNPCs = npcs.filter(n=>!n.userData.dead);
      const hits = raycaster.intersectObjects(aliveNPCs, true);
      if(!hits.length) return;
      const targetRoot = hits[0].object.parent;
      if(hits[0].distance > 4) return;
      targetRoot.userData.hp -= 1;
      targetRoot.position.y = 0.12;
      setTimeout(()=>{ if(!targetRoot.userData.dead) targetRoot.position.y = 0; }, 80);
      if(targetRoot.userData.hp <= 0){
        targetRoot.userData.dead = true;
        targetRoot.visible = false;
        score += 100;
        scoreEl.textContent = score;
        updateAlive();
      }
    }

    addEventListener('mousedown', (e)=>{
      if(!controlEnabled || document.pointerLockElement !== document.body) return;
      if(e.button===0) hitNPC();
    });
    document.getElementById('hitBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); if(controlEnabled) hitNPC(); }, {passive:false});
    document.getElementById('jumpBtn').addEventListener('touchstart', (e)=>{ e.preventDefault(); if(controlEnabled) move.jump=true; }, {passive:false});

    // Mobile joystick + look
    const stickBase = document.getElementById('stickBase');
    const stickKnob = document.getElementById('stickKnob');
    let stickId = null, lookId = null;
    let joyX = 0, joyY = 0;
    let prevLookX = 0, prevLookY = 0;

    function resetStick(){ joyX=0; joyY=0; stickKnob.style.left='40px'; stickKnob.style.top='40px'; }

    addEventListener('touchstart', (e)=>{
      if(!controlEnabled) return;
      for(const t of e.changedTouches){
        const x=t.clientX, y=t.clientY;
        if(stickId===null && x < innerWidth*0.45 && y > innerHeight*0.45){
          stickId = t.identifier;
          const r = stickBase.getBoundingClientRect();
          const cx = r.left + r.width/2, cy = r.top + r.height/2;
          joyX = (x-cx)/45; joyY = (y-cy)/45;
        } else if(lookId===null){
          lookId = t.identifier; prevLookX=x; prevLookY=y;
        }
      }
    }, {passive:false});

    addEventListener('touchmove', (e)=>{
      if(!controlEnabled) return;
      for(const t of e.changedTouches){
        if(t.identifier===stickId){
          const r = stickBase.getBoundingClientRect();
          const cx = r.left + r.width/2, cy = r.top + r.height/2;
          let dx = t.clientX-cx, dy = t.clientY-cy;
          const len = Math.hypot(dx,dy), max=40;
          if(len>max){ dx = dx/len*max; dy = dy/len*max; }
          joyX = dx/max; joyY = dy/max;
          stickKnob.style.left = `${40 + dx}px`;
          stickKnob.style.top = `${40 + dy}px`;
        } else if(t.identifier===lookId){
          const dx = t.clientX - prevLookX;
          const dy = t.clientY - prevLookY;
          prevLookX = t.clientX; prevLookY = t.clientY;
          yaw -= dx * 0.004;
          pitch -= dy * 0.004;
          pitch = Math.max(-1.3, Math.min(1.3, pitch));
          applyLook();
        }
      }
      e.preventDefault();
    }, {passive:false});

    addEventListener('touchend', (e)=>{
      for(const t of e.changedTouches){
        if(t.identifier===stickId){ stickId=null; resetStick(); }
        if(t.identifier===lookId){ lookId=null; }
      }
    });

    function avoidWallsOrTurn(n){
      if(Math.abs(n.position.x) > 36 || Math.abs(n.position.z) > 36) n.userData.dir.multiplyScalar(-1);
      if(Math.random() < 0.008) n.userData.dir.set(Math.random()*2-1,0,Math.random()*2-1).normalize();
    }

    let prev = performance.now();
    function animate(){
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now-prev)/1000, 0.05);
      prev = now;

      if(controlEnabled){
        const speed = (move.run ? 9.3 : 6.1);
        let sx = (move.r?1:0) - (move.l?1:0);
        let sz = (move.f?1:0) - (move.b?1:0);
        if (isTouch) {
          sx += joyX;
          sz += -joyY;
        }
        const mag = Math.hypot(sx,sz) || 1;
        sx /= mag; sz /= mag;

        const forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
        const right = new THREE.Vector3(forward.z,0,-forward.x);
        const moveVec = new THREE.Vector3();
        moveVec.addScaledVector(forward, sz * speed * dt);
        moveVec.addScaledVector(right, sx * speed * dt);
        player.position.add(moveVec);

        vel.y -= 18 * dt;
        if (move.jump && canJump) { vel.y = 7.2; canJump = false; }
        move.jump = false;
        player.position.y += vel.y * dt;
        if(player.position.y < 1.6){ player.position.y = 1.6; vel.y = 0; canJump = true; }
        clampPlayer(player.position);
      }

      for(const n of npcs){
        if(n.userData.dead) continue;
        n.userData.turnTimer -= dt;
        if(n.userData.turnTimer <= 0){
          n.userData.turnTimer = 0.6 + Math.random()*2.5;
          n.userData.dir.set(Math.random()*2-1,0,Math.random()*2-1).normalize();
        }
        n.position.addScaledVector(n.userData.dir, n.userData.speed*dt);
        avoidWallsOrTurn(n);
        n.rotation.y = Math.atan2(n.userData.dir.x, n.userData.dir.z);
      }

      renderer.render(scene,camera);
    }
    animate();

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
