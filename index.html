<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OfficeCraft: Employee Mayhem</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#cdd7e1; font-family:system-ui,sans-serif; }
    #ui{position:fixed;left:10px;top:10px;z-index:10;color:#fff;background:rgba(0,0,0,.45);padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.45}
    #cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;color:#fff;font-size:22px;text-shadow:0 0 6px #000}
    #start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.55)}
    #start button{font-size:18px;padding:14px 22px;border:none;border-radius:10px;cursor:pointer}
    .danger{color:#ff8080;font-weight:700}
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>OfficeCraft: Employee Mayhem</strong></div>
    <div>WASD 이동 / Space 점프 / Shift 달리기</div>
    <div>마우스 시점 / 좌클릭 <span class="danger">직원 때리기</span></div>
    <div>점수: <span id="score">0</span> | 직원 수: <span id="alive">0</span></div>
  </div>
  <div id="cross">+</div>
  <div id="start"><button id="startBtn">클릭해서 시작</button></div>

  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { PointerLockControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/PointerLockControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcdd7e1);
    scene.fog = new THREE.Fog(0xcdd7e1, 20, 120);

    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 250);
    camera.position.set(0, 3, 8);

    const renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x8ea0b2, 0.75));
    const d = new THREE.DirectionalLight(0xffffff, 0.9);
    d.position.set(20,40,10); d.castShadow = true; d.shadow.mapSize.set(2048,2048); scene.add(d);

    const controls = new PointerLockControls(camera, document.body);
    scene.add(controls.getObject());
    const start = document.getElementById('start');
    document.getElementById('startBtn').onclick = () => controls.lock();
    controls.addEventListener('lock', ()=>start.style.display='none');
    controls.addEventListener('unlock', ()=>start.style.display='flex');

    // Office floor & walls
    const floor = new THREE.Mesh(new THREE.BoxGeometry(80,1,80), new THREE.MeshStandardMaterial({color:0xbfc7d1}));
    floor.position.y = -0.5; floor.receiveShadow = true; scene.add(floor);

    function wall(x,y,z,w,h,d,col=0xe8edf2){
      const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:col}));
      m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true; scene.add(m); return m;
    }
    wall(0,2,-40,80,5,1); wall(0,2,40,80,5,1); wall(-40,2,0,1,5,80); wall(40,2,0,1,5,80);

    // Desk grid
    const solids = [];
    function desk(x,z){
      const top = new THREE.Mesh(new THREE.BoxGeometry(3,0.25,2), new THREE.MeshStandardMaterial({color:0x8d6e63}));
      top.position.set(x,1.2,z); top.castShadow=true; top.receiveShadow=true; scene.add(top); solids.push(top);
      const legGeo = new THREE.BoxGeometry(0.2,1.1,0.2);
      const legMat = new THREE.MeshStandardMaterial({color:0x555});
      [[1.3,0.6,0.8],[-1.3,0.6,0.8],[1.3,0.6,-0.8],[-1.3,0.6,-0.8]].forEach(([lx,ly,lz])=>{
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x+lx,ly,z+lz); leg.castShadow=true; leg.receiveShadow=true; scene.add(leg); solids.push(leg);
      });
      const pc = new THREE.Mesh(new THREE.BoxGeometry(0.9,0.6,0.08), new THREE.MeshStandardMaterial({color:0x202225}));
      pc.position.set(x,1.65,z-0.45); scene.add(pc); solids.push(pc);
    }
    for(let gx=-24; gx<=24; gx+=8){
      for(let gz=-24; gz<=24; gz+=8){
        if(Math.random()>0.18) desk(gx,gz);
      }
    }

    // NPC employees
    const npcs = [];
    const npcGroup = new THREE.Group(); scene.add(npcGroup);
    const raycaster = new THREE.Raycaster();

    function makeNPC(x,z){
      const g = new THREE.Group();
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.1,0.45), new THREE.MeshStandardMaterial({color:0x4f79d8}));
      body.position.y = 0.95;
      const head = new THREE.Mesh(new THREE.BoxGeometry(0.55,0.55,0.55), new THREE.MeshStandardMaterial({color:0xf0c7a4}));
      head.position.y = 1.8;
      g.add(body, head);
      g.position.set(x,0,z);
      g.castShadow = true;
      g.userData = {
        hp: 3,
        speed: 0.9 + Math.random()*0.8,
        dir: new THREE.Vector3(Math.random()*2-1,0,Math.random()*2-1).normalize(),
        turnTimer: 0.8 + Math.random()*2.2,
        dead:false
      };
      npcGroup.add(g);
      npcs.push(g);
    }

    function spawnNPCs(n=18){
      for(let i=0;i<n;i++){
        const x = (Math.random()*60)-30;
        const z = (Math.random()*60)-30;
        makeNPC(x,z);
      }
      updateAlive();
    }
    const scoreEl = document.getElementById('score');
    const aliveEl = document.getElementById('alive');
    let score = 0;
    function updateAlive(){ aliveEl.textContent = npcs.filter(n=>!n.userData.dead).length; }
    spawnNPCs();

    // Controls
    const vel = new THREE.Vector3();
    const dir = new THREE.Vector3();
    const move = {f:false,b:false,l:false,r:false,run:false};
    let canJump=false;
    const onKey=(d,e)=>{
      switch(e.code){
        case 'KeyW': move.f=d; break; case 'KeyS': move.b=d; break;
        case 'KeyA': move.l=d; break; case 'KeyD': move.r=d; break;
        case 'ShiftLeft': move.run=d; break;
        case 'Space': if(d&&canJump){ vel.y=7.2; canJump=false; } break;
      }
    };
    addEventListener('keydown',e=>onKey(true,e));
    addEventListener('keyup',e=>onKey(false,e));

    function clampPlayer(p){
      p.x = Math.max(-38, Math.min(38,p.x));
      p.z = Math.max(-38, Math.min(38,p.z));
    }

    function hitNPC(){
      raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
      const aliveNPCs = npcs.filter(n=>!n.userData.dead);
      const hits = raycaster.intersectObjects(aliveNPCs, true);
      if(!hits.length) return;
      const targetRoot = hits[0].object.parent;
      if(hits[0].distance > 4) return;
      targetRoot.userData.hp -= 1;
      targetRoot.position.y = 0.12;
      setTimeout(()=>{ if(!targetRoot.userData.dead) targetRoot.position.y = 0; }, 80);
      if(targetRoot.userData.hp <= 0){
        targetRoot.userData.dead = true;
        targetRoot.visible = false;
        score += 100;
        scoreEl.textContent = score;
        updateAlive();
      }
    }

    addEventListener('mousedown', (e)=>{
      if(!controls.isLocked) return;
      if(e.button===0) hitNPC();
    });

    function avoidWallsOrTurn(n){
      if(Math.abs(n.position.x) > 36 || Math.abs(n.position.z) > 36){
        n.userData.dir.multiplyScalar(-1);
      }
      if(Math.random() < 0.008){
        n.userData.dir.set(Math.random()*2-1,0,Math.random()*2-1).normalize();
      }
    }

    let prev = performance.now();
    function animate(){
      requestAnimationFrame(animate);
      const now = performance.now();
      const dt = Math.min((now-prev)/1000, 0.05);
      prev = now;

      if(controls.isLocked){
        const speed = move.run ? 9.3 : 6.1;
        dir.set(0,0,0);
        if(move.f) dir.z -= 1; if(move.b) dir.z += 1;
        if(move.l) dir.x -= 1; if(move.r) dir.x += 1;
        dir.normalize();

        vel.x = dir.x * speed;
        vel.z = dir.z * speed;
        vel.y -= 18 * dt;

        controls.moveRight(vel.x * dt);
        controls.moveForward(-vel.z * dt);
        controls.getObject().position.y += vel.y * dt;
        const p = controls.getObject().position;
        if(p.y < 1.6){ p.y = 1.6; vel.y = 0; canJump = true; }
        clampPlayer(p);
      }

      // NPC wandering
      for(const n of npcs){
        if(n.userData.dead) continue;
        n.userData.turnTimer -= dt;
        if(n.userData.turnTimer <= 0){
          n.userData.turnTimer = 0.6 + Math.random()*2.5;
          n.userData.dir.set(Math.random()*2-1,0,Math.random()*2-1).normalize();
        }
        n.position.addScaledVector(n.userData.dir, n.userData.speed*dt);
        avoidWallsOrTurn(n);
        n.rotation.y = Math.atan2(n.userData.dir.x, n.userData.dir.z);
      }

      renderer.render(scene,camera);
    }
    animate();

    addEventListener('resize', ()=>{
      camera.aspect = innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>
</body>
</html>
