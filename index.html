<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>OfficeCraft: Employee Mayhem</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#cdd7e1; font-family:system-ui,sans-serif; touch-action:none; }
    #ui{position:fixed;left:10px;top:10px;z-index:10;color:#fff;background:rgba(0,0,0,.45);padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.45;max-width:78vw}
    #cross{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:10;color:#fff;font-size:22px;text-shadow:0 0 6px #000;pointer-events:none}
    #start{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;background:rgba(0,0,0,.55)}
    #start button{font-size:18px;padding:14px 22px;border:none;border-radius:10px;cursor:pointer}
    .danger{color:#ff8080;font-weight:700}

    #mobileHud{position:fixed;inset:0;z-index:40;pointer-events:none;display:none}
    #stickBase{position:absolute;left:20px;bottom:20px;width:120px;height:120px;border-radius:999px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);pointer-events:auto}
    #stickKnob{position:absolute;left:40px;top:40px;width:40px;height:40px;border-radius:999px;background:rgba(255,255,255,.75)}
    .mbtn{position:absolute;right:20px;width:74px;height:74px;border:none;border-radius:999px;color:#fff;font-weight:700;font-size:14px;background:rgba(0,0,0,.45);border:2px solid rgba(255,255,255,.35);pointer-events:auto}
    #hitBtn{bottom:22px}
    #jumpBtn{bottom:108px}

    #leaderboard{position:fixed;right:10px;bottom:10px;z-index:16;width:280px;background:rgba(0,0,0,.45);color:#fff;border-radius:10px;padding:8px;font-size:12px}
    #leaderboard h4{margin:0 0 6px 0;font-size:13px}
    #lbList{margin:0;padding-left:16px;max-height:140px;overflow:auto}
  </style>
</head>
<body>
  <div id="ui">
    <div><strong>OfficeCraft: Employee Mayhem</strong></div>
    <div id="controlsText">WASD 이동 / Space 점프 / Shift 달리기</div>
    <div id="lookText">마우스 시점 / 좌클릭 <span class="danger">직원 때리기</span></div>
    <div>점수: <span id="score">0</span> | 직원 수: <span id="alive">0</span></div>
    <div>팀: <span id="teamName">-</span> | HP: <span id="hpVal">100</span></div>
    <div>타워전: 블루 <span id="blueCap">0</span> : <span id="redCap">0</span> 레드</div>
    <div>무기: <span id="weaponName">-</span> | 사거리: <span id="weaponRange">-</span> | 고용: E(300점)</div>
    <div>기력: <span id="chiState">0/10</span> <span id="ultReady" style="display:none;color:#ffe08a;font-weight:700">⚡ 필살기 준비!</span></div>
    <div>멀티룸: <span id="roomId"></span> (<span id="netState">오프라인</span>)</div>
  </div>
  <div id="cross">+</div>
  <div id="start"><button id="startBtn">클릭해서 시작</button></div>

  <div id="mobileHud">
    <div id="stickBase"><div id="stickKnob"></div></div>
    <button class="mbtn" id="jumpBtn">점프</button>
    <button class="mbtn" id="hitBtn">공격</button>
    <button class="mbtn" id="ultBtn" style="bottom:194px">필살기</button>
    <button class="mbtn" id="hireBtn" style="bottom:280px">고용</button>
  </div>

  <div id="leaderboard">
    <h4>🏆 리더보드</h4>
    <ol id="lbList"></ol>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
